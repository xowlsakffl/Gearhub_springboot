spring.application.name=sb-ecom

server.port=${SERVER_PORT:8080}

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

project.image=${PROJECT_IMAGE_PATH:images/}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/ecommerce-db;MODE=MySQL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}

spring.app.jwtSecret=${JWT_SECRET:TXlTdXBlclNlY3JldEtleUZvckxvY2FsRGVtb0p3dEF1dGhGbG93MTIzNDU2Nzg5MA==}
spring.app.jwtExpirationMs=${JWT_EXPIRATION_MS:86400000}
spring.ecom.app.jwtCookieName=${JWT_COOKIE_NAME:springBootEcom}

logging.level.org.springframework=${SPRING_LOG_LEVEL:INFO}
logging.level.org.hibernate.SQL=${HIBERNATE_SQL_LOG_LEVEL:WARN}
logging.level.org.springframework.security=${SPRING_SECURITY_LOG_LEVEL:INFO}
logging.level.com.ecommerce.project=${ECOM_LOG_LEVEL:INFO}

frontend.url=${FRONTEND_URL:http://localhost:5173}
image.base.url=${IMAGE_BASE_URL:http://localhost:8080/images}

stripe.secret.key=${STRIPE_SECRET_KEY:}
